apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: codeconductor
  labels:
    app: codeconductor
    component: auth
    version: v1
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: codeconductor
      component: auth
  template:
    metadata:
      labels:
        app: codeconductor
        component: auth
        version: v1
    spec:
      containers:
        - name: auth
          image: your-username/codeconductor-auth:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8003
              name: http
              protocol: TCP
          env:
            - name: AUTH_HOST
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: AUTH_HOST
            - name: AUTH_PORT
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: AUTH_PORT
            - name: AUTH_LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: AUTH_LOG_LEVEL
            - name: AUTH_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: codeconductor-secrets
                  key: auth-secret-key
            - name: AUTH_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: AUTH_TOKEN_EXPIRE_MINUTES
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: ENVIRONMENT
            - name: LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: LOG_FORMAT
            - name: METRICS_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: codeconductor-config
                  key: METRICS_ENABLED
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 256Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health
              port: 8003
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      imagePullSecrets:
        - name: dockerhub-secret
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: codeconductor
  labels:
    app: codeconductor
    component: auth
spec:
  type: ClusterIP
  ports:
    - port: 8003
      targetPort: 8003
      protocol: TCP
      name: http
  selector:
    app: codeconductor
    component: auth
