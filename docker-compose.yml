version: "3.8"

services:
  codeconductor:
    build: .
    container_name: codeconductor-v2
    ports:
      - "8000:8000"   # FastAPI
      - "8501:8501"   # Streamlit GUI
    volumes:
      - ./data:/app/data        # Persist generated projects
      - ./config:/app/config    # Mount config for easy updates
      - ./prompts:/app/prompts  # Mount prompts for customization
    environment:
      - JWT_SECRET=${JWT_SECRET:-supersecretkey}
      - CONFIG_PATH=/app/config/base.yaml
      - PYTHONPATH=/app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: >
      bash -c "
        echo '🎼 CodeConductor v2.0 Starting...' &&
        echo '📊 API: http://localhost:8000' &&
        echo '🎨 GUI: http://localhost:8501' &&
        echo '📁 Data: /app/data' &&
        uvicorn generated_api:app --host 0.0.0.0 --port 8000 &
        streamlit run app.py --server.port 8501 --server.headless true --server.address 0.0.0.0
      "

